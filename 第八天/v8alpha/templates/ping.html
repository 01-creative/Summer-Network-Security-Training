{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2 class="card-title">Ping 网络诊断</h2>
    <p class="info-text">输入 IP 地址或域名进行 Ping 测试</p>

    <form method="POST" action="{{ url_for('ping') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <input class="form-input" type="text" name="ip"
                   placeholder="例如: 127.0.0.1 或 8.8.8.8"
                   value="" maxlength="200">
        </div>
        <button class="btn" type="submit">Ping</button>
    </form>

    {% if error %}
    <div class="error-msg" style="margin-top:16px;">
        {{ error }}
    </div>
    {% endif %}

    {% if result %}
    <div style="margin-top:20px; padding-top:16px; border-top:1px solid #333;">
        <h3 style="margin-bottom:12px; color:#0f0;">Ping 结果：</h3>
        <pre style="background:#000; color:#0f0; padding:16px; border-radius:6px;
                    font-size:13px; font-family:monospace; max-height:600px;
                    overflow:auto; white-space:pre-wrap; word-break:break-all;">{{ result }}</pre>
    </div>
    {% endif %}
</div>

{% endblock %}
