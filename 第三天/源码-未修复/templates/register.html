{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 class="card-title">用户注册</h2>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/register">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label class="form-label">用户名</label>
            <input class="form-input" type="text" name="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label class="form-label">密码</label>
            <input class="form-input" type="password" name="password" placeholder="请输入密码" required>
        </div>
        <div class="form-group">
            <label class="form-label">邮箱</label>
            <input class="form-input" type="email" name="email" placeholder="请输入邮箱">
        </div>
        <div class="form-group">
            <label class="form-label">手机号</label>
            <input class="form-input" type="text" name="phone" placeholder="请输入手机号">
        </div>
        <button class="btn" type="submit">注册</button>
    </form>
</div>
{% endblock %}
