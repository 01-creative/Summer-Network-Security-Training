<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <nav class="navbar">
        <div class="nav-inner">
            <div class="nav-left">
                <div class="nav-logo">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="3"/>
                        <path d="M12 8v8M8 12h8"/>
                    </svg>
                </div>
                <span class="nav-brand">用户管理系统</span>
            </div>
            <div class="nav-right">
                {% if session.username %}
                <div class="nav-user">
                    <div class="nav-avatar">{{ session.username[0] | upper }}</div>
                    <span class="nav-welcome">{{ session.username }}</span>
                </div>
                <a href="/logout" class="nav-link nav-link-logout">退出</a>
                {% else %}
                <a href="/login" class="nav-link nav-link-login">登录</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="main-container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
